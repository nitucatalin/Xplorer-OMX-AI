# ============================================================================
# bridge.yaml — configurarea ros_gz_bridge intre Gazebo (gz) si ROS 2
# Echivalentul functional al puntii CycloneDDS din sistemul real:
# aici puntea e gz <-> ROS, pe acelasi host.
# ============================================================================
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/model/xplorer_omx/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/odom"
  gz_topic_name: "/model/xplorer_omx/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/tf"
  gz_topic_name: "/model/xplorer_omx/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

- ros_topic_name: "/scan"
  gz_topic_name: "/scan_gz"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/joint_states"
  gz_topic_name: "/model/xplorer_omx/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# NOTA: /world/.../dynamic_pose/info din Harmonic vine FARA numele
# entitatilor (doar ID-uri) — inutilizabil. Ground-truth-ul vine pe
# topicuri OdometryPublisher cu nume fixe, iar nodul ground_truth_mux
# le reasambleaza in /sim/dynamic_poses cu child_frame_id corecte.
- ros_topic_name: "/sim/gt/robot"
  gz_topic_name: "/model/xplorer_omx/ground_truth"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

